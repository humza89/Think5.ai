# fly.toml app configuration file generated for think5-voice-relay on 2026-03-29T08:49:09-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'think5-voice-relay'
primary_region = 'iad'

[build]
  dockerfile = 'Dockerfile'

[env]
  PORT = '8080'
  # SENTRY_DSN is set via `fly secrets set` (not in fly.toml) because
  # it's a credential. Listed here as a comment so operators know to
  # set it. If unset, Sentry is a no-op — no errors are sent.
  # fly secrets set SENTRY_DSN="https://...@sentry.io/..." --app think5-voice-relay
  NODE_ENV = 'production'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 1000
    soft_limit = 800

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
