name: Nightly Soak Test

on:
  schedule:
    - cron: "0 2 * * *"  # 2 AM UTC daily
  workflow_dispatch: {}    # Manual trigger

jobs:
  soak-test:
    name: Soak + Chaos Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      EVAL_MOCK_MODE: "true"
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Run eval harness (mock mode, 3 runs)
        run: npx tsx eval/interview-harness.ts --all --runs 3

      - name: Run soak test (50 simulated interviews)
        run: npx tsx eval/soak-test-config.ts --interviews 50 || true

      - name: Run chaos tests (unauthenticated)
        run: npx tsx eval/chaos-test.ts || true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-soak-results
          path: |
            eval/eval-results.json
            eval/chaos-results.json
            eval/soak-results.json
          retention-days: 14

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Nightly soak test failed — ${new Date().toISOString().slice(0,10)}`,
              body: `The nightly soak/chaos test suite failed.\n\nRun: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}\n\nPlease investigate before next deploy.`,
              labels: ['reliability', 'automated']
            });

      - name: Notify Slack on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.27.0
        with:
          payload: |
            {
              "text": "Nightly Soak Test Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Nightly Soak Test Failed*\n\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Run>\n\nPlease investigate before next deploy."
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
