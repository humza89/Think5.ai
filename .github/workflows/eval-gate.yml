name: Eval Gate

on:
  pull_request:
    branches: [main, "release/*"]
  push:
    branches: [main, "release/*"]

# Required status check — configure in GitHub repo settings:
#   Settings → Branches → Branch protection rules → main
#   ✅ Require status checks: "TypeScript Type Check", "Eval Harness (Mock Mode)"

jobs:
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  eval-harness:
    name: Eval Harness (Mock Mode)
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      EVAL_MOCK_MODE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx eval/interview-harness.ts --all

      - name: Verify eval passed
        run: |
          if [ -f eval/eval-results.json ]; then
            PASSED=$(node -e "const r=JSON.parse(require('fs').readFileSync('eval/eval-results.json','utf8')); console.log(r[r.length-1]?.overallPassed ?? false)")
            if [ "$PASSED" != "true" ]; then
              echo "::error::Eval harness did not pass — merge blocked"
              exit 1
            fi
          fi

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval/eval-results.json
          retention-days: 30
