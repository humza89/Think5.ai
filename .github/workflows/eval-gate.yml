name: Eval Gate

on:
  pull_request:
    branches: [main, "release/*"]
  push:
    branches: [main, "release/*"]

jobs:
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit

  eval-harness:
    name: Eval Harness (Mock Mode)
    runs-on: ubuntu-latest
    needs: typecheck
    env:
      EVAL_MOCK_MODE: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx tsx eval/interview-harness.ts --all
      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: eval/eval-results.json
          retention-days: 30
